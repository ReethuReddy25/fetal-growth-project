<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register | Fetal Growth Detection</title>
  <link rel="stylesheet" href="/frontend/styles.css">
</head>
<body>

  <div class="page-center">
    <div class="card auth-card">

      <h1 class="center-text">Create an Account</h1>
      <p class="muted center-text">a
        Register to upload ultrasound images and analyze fetal growth.
      </p>

      <form id="registerForm" class="form">
        <label>Email
          <input type="email" id="email" placeholder="doctor@example.com" required>
        </label>

        <label>Password
          <input type="password" id="password" required>
        </label>

        <label>Confirm Password
          <input type="password" id="confirmPassword" required>
        </label>

        <button type="submit" id="registerBtn" class="btn full">Register</button>
        <p id="error" class="error"></p>
      </form>

      <p class="foot muted center-text">
        Already have an account?
        <a href="login.html">Sign in</a>
      </p>

    </div>
  </div>

  <script src="/frontend/js/register.js" defer></script>
</body>
</html>
